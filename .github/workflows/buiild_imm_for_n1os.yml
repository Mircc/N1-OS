name: Build OpenWRT-IMM for N1

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: N1-IMM/.config
  FILES: N1-IMM/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Check machine configuration
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo "云编译建议取消勾选Node.js及其相关插件！"
        echo "已知CPU型号（降序）：7763,8370C,8272CL,8171M,E5系列"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo "--------------------------硬盘信息--------------------------"
        echo -e  "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "硬盘详情："
        df -Th

    - name: Checkout
      uses: actions/checkout@main

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: | 
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq install -y $(curl -fsSL https://raw.githubusercontent.com/nantayo/My-Pkg/master/2305)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        cd openwrt

        # 获取 OpenWrt 版本号（兼容 24.10）
        if [ -f include/version.mk ]; then
            OPENWRT_VER=$(grep -E "VERSION_NUMBER" include/version.mk | sed -E 's/.*:=\s*//;s/["'\'' ]//g')
            # 如果是变量引用，则从 .config 或 version 文件读取
            if [[ "$OPENWRT_VER" =~ ^\$\(.+\)$ ]]; then
                if [ -f .config ]; then
                    OPENWRT_VER=$(grep -E "^CONFIG_VERSION_NUMBER=" .config | cut -d'"' -f2)
                fi
                [ -z "$OPENWRT_VER" ] && [ -f version ] && OPENWRT_VER=$(cat version)
            fi
        fi
        [ -z "$OPENWRT_VER" ] && OPENWRT_VER="unknown"

        BUILD_DATE=$(date +%Y%m%d)
        echo "=============================================="
        echo " 当前源码 OpenWrt 版本号: $OPENWRT_VER"
        echo " 源码路径: $(pwd)"
        echo "=============================================="
        echo "OPENWRT_VER=$OPENWRT_VER" >> $GITHUB_ENV
        echo "PACKAGED_OUTPUTDATE=$BUILD_DATE" >> $GITHUB_ENV

        # 品牌修改为 N1_OS
        sed -i "s|DISTRIB_ID='ImmortalWrt'|DISTRIB_ID='N1_OS'|g" package/base-files/files/etc/openwrt_release
        if [ -n "$OPENWRT_VER" ]; then
            sed -i "s|DISTRIB_RELEASE='.*'|DISTRIB_RELEASE='${OPENWRT_VER//\//\\/}'|g" package/base-files/files/etc/openwrt_release
        fi
        sed -i "s|ImmortalWrt|N1_OS|g" package/base-files/files/etc/banner
        sed -i "s|OpenWrt|N1_OS|g" package/base-files/files/etc/banner

        LUCI_CFG="feeds/luci/modules/luci-base/root/etc/config/luci"
        [ -f "$LUCI_CFG" ] && {
          sed -i "s|ImmortalWrt|N1_OS|g" "$LUCI_CFG"
          sed -i "s|OpenWrt|N1_OS|g" "$LUCI_CFG"
        }

        # 批量替换 po 文件
        find feeds/luci/modules/luci-base/po -type f -name "*.po" -print0 | xargs -0 sed -i "s|ImmortalWrt|N1_OS|g"
        find feeds/luci/modules/luci-base/po -type f -name "*.po" -print0 | xargs -0 sed -i "s|OpenWrt|N1_OS|g"

        LOGIN_VIEW="feeds/luci/themes/luci-theme-bootstrap/luasrc/view/themes/bootstrap/sysauth.htm"
        [ -f "$LOGIN_VIEW" ] && {
          sed -i 's|ImmortalWrt|N1_OS|g' "$LOGIN_VIEW"
          sed -i 's|OpenWrt|N1_OS|g' "$LOGIN_VIEW"
        }

        # 添加插件
        git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall-packages package/openwrt-passwall-packages
        git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall package/openwrt-passwall
        git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon package/luci-theme-argon
        git clone --depth=1 https://github.com/jerrykuku/luci-app-argon-config package/luci-app-argon-config
        git clone --depth=1 https://github.com/ophub/luci-app-amlogic package/amlogic
        git clone --depth=1 https://github.com/sirpdboy/luci-app-ddns-go package/ddnsgo
        git clone -b v5-lua --single-branch --depth 1 https://github.com/sbwml/luci-app-mosdns package/mosdns
        git clone -b lua --single-branch --depth 1 https://github.com/sbwml/luci-app-alist package/alist
        git clone --depth=1 https://github.com/gdy666/luci-app-lucky.git package/lucky
        git clone --depth=1 https://github.com/sbwml/luci-app-openlist2.git package/openlist
        git clone --depth=1 -b master --single-branch --filter=blob:none --sparse https://github.com/vernesong/OpenClash
        cd OpenClash && git sparse-checkout set luci-app-openclash && mv luci-app-openclash ../package && cd .. && rm -rf OpenClash

        # 配置编译选项
        cat >> .config <<EOF
        CONFIG_PACKAGE_openlist=y
        CONFIG_PACKAGE_luci-app-openlist2=y
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_ca-bundle=y
        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_ipset=y
        CONFIG_PACKAGE_iptables-mod-extra=y
        CONFIG_PACKAGE_kmod-tun=y
        CONFIG_TARGET_KERNEL_PARTSIZE=64
        CONFIG_TARGET_ROOTFS_PARTSIZE=2048
        EOF

        # 防火墙判断
        if [[ "$OPENWRT_VER" =~ ^24\. || "$OPENWRT_VER" =~ ^23\. || "$OPENWRT_VER" =~ ^22\.03 ]]; then
            echo "✅ 检测到 OpenWrt $OPENWRT_VER - 启用 Firewall4（nftables）"
            sed -i '/CONFIG_PACKAGE_firewall=/d' .config
            echo "CONFIG_PACKAGE_firewall4=y" >> .config
            echo "# CONFIG_PACKAGE_firewall is not set" >> .config
            echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config
        else
            echo "✅ 保持 Firewall3 并启用 iptables-mod-tproxy"
            sed -i '/CONFIG_PACKAGE_firewall4=/d' .config
            echo "CONFIG_PACKAGE_firewall=y" >> .config
            echo "CONFIG_PACKAGE_iptables-mod-tproxy=y" >> .config
        fi

        # 移除冲突包
        rm -rf feeds/packages/net/v2ray-geodata \
               feeds/luci/themes/luci-theme-argon \
               feeds/luci/applications/luci-app-argon-config \
               feeds/packages/net/mosdns \
               feeds/packages/utils/v2dat \
               feeds/luci/applications/luci-app-mosdns \
               feeds/luci/applications/luci-app-alist \
               feeds/packages/net/alist

        # 修改默认 IP
        sed -i 's/192.168.1.1/192.168.50.200/g' package/base-files/files/bin/config_generate

        # 修改默认时间格式
        TIME_FILES=$(find ./package/*/autocore/files/ -type f -name "index.htm")
        [ -n "$TIME_FILES" ] && sed -i 's|os.date()|os.date("%Y-%m-%d %H:%M:%S %A")|g' $TIME_FILES

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "compile_status=success" >> $GITHUB_ENV

    - name: Package OpenWrt Firmware
      if: ${{ env.compile_status }} == 'success' && !cancelled()
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/*rootfs.tar.gz
        KERNEL_VERSION_NAME: 5.15.176
        KERNEL_AUTO_LATEST: false
        PACKAGE_SOC: s905d
        WHOAMI: fightroad
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@main
      if: ${{ env.PACKAGED_STATUS == 'success' }} && !cancelled()
      with:
        tag: N1_OS_${{ env.OPENWRT_VER }}_${{ env.PACKAGED_OUTPUTDATE }}
        artifacts: /opt/openwrt_packit/output/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          基于 ImmortalWrt ${{ env.OPENWRT_VER }} 构建
          首次使用建议全新刷写
          * 基本信息
          固件品牌: N1_OS
          OpenWrt 版本: ${{ env.OPENWRT_VER }}
          编译日期: ${{ env.PACKAGED_OUTPUTDATE }}
          默认IP: 192.168.50.200
          账户: root
          密码: 空
